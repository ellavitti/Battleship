<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .game-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .board-title {
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 35px);
            gap: 2px;
            background: #16213e;
            padding: 5px;
            border-radius: 8px;
        }
        .cell {
            width: 35px;
            height: 35px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
        }
        .cell:hover {
            background: #1a4a7a;
        }
        .cell.ship {
            background: #4a90d9;
        }
        .cell.ship-h-start {
            background: #4a90d9;
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
        }
        .cell.ship-h-middle {
            background: #4a90d9;
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .cell.ship-h-end {
            background: #4a90d9;
            border-top: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
        }
        .cell.ship-v-start {
            background: #4a90d9;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
        }
        .cell.ship-v-middle {
            background: #4a90d9;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
        }
        .cell.ship-v-end {
            background: #4a90d9;
            border-bottom: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
        }
        .cell.hit {
            background: #e74c3c;
        }
        .cell.miss {
            background: #7f8c8d;
        }
        .cell.sunk {
            background: #8b0000;
        }
        .cell.ai-cell {
            cursor: pointer;
        }
        .cell.ai-cell.hit,
        .cell.ai-cell.miss,
        .cell.ai-cell.sunk {
            cursor: default;
        }
        .cell.player-cell {
            cursor: default;
        }
        .cell.player-cell.placement-mode {
            cursor: pointer;
        }
        .cell.preview {
            background: #2a6db5;
            opacity: 0.7;
        }
        .cell.preview-invalid {
            background: #e74c3c;
            opacity: 0.5;
        }
        .placement-panel {
            margin-top: 20px;
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            min-width: 250px;
        }
        .placement-info {
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .current-ship {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f3460;
            border-radius: 5px;
        }
        .orientation-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .orientation-btn {
            flex: 1;
            padding: 10px;
            background: #0f3460;
            color: #eee;
            border: 2px solid #1a4a7a;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .orientation-btn:hover {
            background: #1a4a7a;
        }
        .orientation-btn.active {
            background: #4a90d9;
            border-color: #4a90d9;
        }
        .random-btn {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .random-btn:hover {
            background: #219150;
        }
        .placement-error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .status-panel {
            margin-top: 20px;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            min-width: 200px;
        }
        .status-title {
            font-weight: 600;
            margin-bottom: 10px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        .ship-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9rem;
        }
        .ship-item.sunk {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .game-status {
            margin-top: 20px;
            font-size: 1.1rem;
            padding: 10px 20px;
            background: #16213e;
            border-radius: 8px;
        }
        .restart-btn {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 1rem;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .restart-btn:hover {
            background: #357abd;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Battleship</h1>
    <div class="game-status" id="gameStatus">Click on the enemy grid to fire!</div>
    <div class="game-container">
        <div class="board-section">
            <div class="board-title">Your Fleet</div>
            <div class="grid" id="playerGrid"></div>
            <div class="status-panel" id="playerStatusPanel">
                <div class="status-title">Your Ships</div>
                <div id="playerShips"></div>
            </div>
            <div class="placement-panel" id="placementPanel" style="display: none;">
                <div class="placement-info">Place your ships</div>
                <div class="current-ship" id="currentShip">Carrier (5)</div>
                <div class="orientation-toggle">
                    <button class="orientation-btn active" id="horizontalBtn" onclick="setOrientation('horizontal')">Horizontal</button>
                    <button class="orientation-btn" id="verticalBtn" onclick="setOrientation('vertical')">Vertical</button>
                </div>
                <button class="random-btn" onclick="randomPlacement()">Random Placement</button>
                <div class="placement-error" id="placementError"></div>
            </div>
        </div>
        <div class="board-section" id="enemySection" style="display: none;">
            <div class="board-title">Enemy Fleet</div>
            <div class="grid" id="aiGrid"></div>
            <div class="status-panel">
                <div class="status-title">Enemy Ships</div>
                <div id="aiShips"></div>
            </div>
        </div>
    </div>
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #4a90d9;"></div>
            <span>Ship</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e74c3c;"></div>
            <span>Hit</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #7f8c8d;"></div>
            <span>Miss</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #8b0000;"></div>
            <span>Sunk</span>
        </div>
    </div>
    <button class="restart-btn" onclick="initGame()">New Game</button>

    <script>
        const SHIPS = [
            { name: 'Carrier', size: 5 },
            { name: 'Battleship', size: 4 },
            { name: 'Cruiser', size: 3 },
            { name: 'Submarine', size: 3 },
            { name: 'Destroyer', size: 2 }
        ];

        const GRID_SIZE = 10;
        let playerBoard = [];
        let aiBoard = [];
        let playerShips = [];
        let aiShips = [];
        let gameOver = false;
        let playerTurn = true;
        let gamePhase = 'placement'; // 'placement' or 'battle'
        let placementOrientation = 'horizontal';
        let currentShipIndex = 0;
        let previewCells = [];

        // AI Hunt/Target mode
        let huntMode = true;
        let originHit = null; // { row, col }
        let triedDirections = []; // Array of direction strings: 'up', 'down', 'left', 'right'
        let currentDirection = null; // Current direction being fired
        let currentPosition = null; // Current position to fire from

        function initGame() {
            playerBoard = createEmptyBoard();
            aiBoard = createEmptyBoard();
            playerShips = [];
            aiShips = [];
            resetAITargeting();
            gameOver = false;
            playerTurn = true;
            gamePhase = 'placement';
            placementOrientation = 'horizontal';
            currentShipIndex = 0;
            previewCells = [];

            placeShips(aiBoard, aiShips);

            document.getElementById('placementPanel').style.display = 'block';
            document.getElementById('playerStatusPanel').style.display = 'none';
            document.getElementById('enemySection').style.display = 'none';
            document.getElementById('gameStatus').textContent = 'Place your ships to begin!';
            
            updateCurrentShipDisplay();
            renderBoard('playerGrid', playerBoard, false);
            updateOrientationButtons();
        }

        function createEmptyBoard() {
            return Array(GRID_SIZE).fill(null).map(() => 
                Array(GRID_SIZE).fill(null).map(() => ({ hit: false, ship: null, shipPosition: null, shipOrientation: null }))
            );
        }

        function placeShips(board, shipsList) {
            SHIPS.forEach(shipType => {
                let placed = false;
                while (!placed) {
                    const horizontal = Math.random() < 0.5;
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlaceShip(board, row, col, shipType.size, horizontal)) {
                        const ship = {
                            name: shipType.name,
                            size: shipType.size,
                            cells: [],
                            sunk: false
                        };
                        
                        for (let i = 0; i < shipType.size; i++) {
                            const r = horizontal ? row : row + i;
                            const c = horizontal ? col + i : col;
                            board[r][c].ship = ship;
                            board[r][c].shipPosition = i;
                            board[r][c].shipOrientation = horizontal ? 'horizontal' : 'vertical';
                            ship.cells.push({ row: r, col: c });
                        }
                        shipsList.push(ship);
                        placed = true;
                    }
                }
            });
        }

        function setOrientation(orientation) {
            placementOrientation = orientation;
            updateOrientationButtons();
            clearPreview();
        }

        function updateOrientationButtons() {
            document.getElementById('horizontalBtn').classList.toggle('active', placementOrientation === 'horizontal');
            document.getElementById('verticalBtn').classList.toggle('active', placementOrientation === 'vertical');
        }

        function updateCurrentShipDisplay() {
            if (currentShipIndex < SHIPS.length) {
                const ship = SHIPS[currentShipIndex];
                document.getElementById('currentShip').textContent = `${ship.name} (${ship.size})`;
            } else {
                document.getElementById('currentShip').textContent = 'All ships placed!';
            }
        }

        function randomPlacement() {
            clearPreview();
            placeShips(playerBoard, playerShips);
            currentShipIndex = SHIPS.length;
            startGame();
        }

        function handlePlacementClick(row, col) {
            if (gamePhase !== 'placement') return;
            
            clearPreview();
            
            const ship = SHIPS[currentShipIndex];
            const horizontal = placementOrientation === 'horizontal';
            
            if (canPlaceShip(playerBoard, row, col, ship.size, horizontal)) {
                // Place the ship
                const newShip = {
                    name: ship.name,
                    size: ship.size,
                    cells: [],
                    sunk: false
                };
                
                for (let i = 0; i < ship.size; i++) {
                    const r = horizontal ? row : row + i;
                    const c = horizontal ? col + i : col;
                    playerBoard[r][c].ship = newShip;
                    playerBoard[r][c].shipPosition = i;
                    playerBoard[r][c].shipOrientation = horizontal ? 'horizontal' : 'vertical';
                    newShip.cells.push({ row: r, col: c });
                }
                
                playerShips.push(newShip);
                currentShipIndex++;
                document.getElementById('placementError').textContent = '';
                
                if (currentShipIndex >= SHIPS.length) {
                    startGame();
                } else {
                    updateCurrentShipDisplay();
                    renderBoard('playerGrid', playerBoard, false);
                }
            } else {
                document.getElementById('placementError').textContent = 'Invalid placement: ship would overlap or go out of bounds';
            }
        }

        function previewShip(row, col) {
            clearPreview();
            
            if (currentShipIndex >= SHIPS.length) return;
            
            const ship = SHIPS[currentShipIndex];
            const horizontal = placementOrientation === 'horizontal';
            const valid = canPlaceShip(playerBoard, row, col, ship.size, horizontal);
            
            for (let i = 0; i < ship.size; i++) {
                const r = horizontal ? row : row + i;
                const c = horizontal ? col + i : col;
                
                if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) {
                    const cell = document.querySelector(`#playerGrid .cell[data-row="${r}"][data-col="${c}"]`);
                    if (cell) {
                        cell.classList.add(valid ? 'preview' : 'preview-invalid');
                        previewCells.push(cell);
                    }
                }
            }
        }

        function clearPreview() {
            previewCells.forEach(cell => {
                cell.classList.remove('preview', 'preview-invalid');
            });
            previewCells = [];
        }

        function startGame() {
            gamePhase = 'battle';
            document.getElementById('placementPanel').style.display = 'none';
            document.getElementById('playerStatusPanel').style.display = 'block';
            document.getElementById('enemySection').style.display = 'flex';
            document.getElementById('gameStatus').textContent = 'Click on the enemy grid to fire!';
            
            renderBoard('playerGrid', playerBoard, false);
            renderBoard('aiGrid', aiBoard, true);
            renderShipStatus('playerShips', playerShips);
            renderShipStatus('aiShips', aiShips);
        }

        function canPlaceShip(board, row, col, size, horizontal) {
            for (let i = 0; i < size; i++) {
                const r = horizontal ? row : row + i;
                const c = horizontal ? col + i : col;
                if (r >= GRID_SIZE || c >= GRID_SIZE || board[r][c].ship) {
                    return false;
                }
            }
            return true;
        }

        function renderBoard(gridId, board, isAI) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    const cellData = board[row][col];
                    
                    if (isAI) {
                        cell.classList.add('ai-cell');
                        if (cellData.hit) {
                            if (cellData.ship && cellData.ship.sunk) {
                                cell.classList.add('sunk');
                            } else if (cellData.ship) {
                                cell.classList.add('hit');
                            } else {
                                cell.classList.add('miss');
                            }
                        }
                    } else {
                        cell.classList.add('player-cell');
                        if (gamePhase === 'placement') {
                            cell.classList.add('placement-mode');
                        }
                        if (cellData.ship) {
                            if (cellData.ship.sunk) {
                                cell.classList.add('sunk');
                            } else {
                                cell.classList.add('ship');
                                // Add ship outline classes based on position and orientation
                                if (cellData.shipOrientation === 'horizontal') {
                                    if (cellData.shipPosition === 0) {
                                        cell.classList.add('ship-h-start');
                                    } else if (cellData.shipPosition === cellData.ship.size - 1) {
                                        cell.classList.add('ship-h-end');
                                    } else {
                                        cell.classList.add('ship-h-middle');
                                    }
                                } else {
                                    if (cellData.shipPosition === 0) {
                                        cell.classList.add('ship-v-start');
                                    } else if (cellData.shipPosition === cellData.ship.size - 1) {
                                        cell.classList.add('ship-v-end');
                                    } else {
                                        cell.classList.add('ship-v-middle');
                                    }
                                }
                            }
                        }
                        if (cellData.hit) {
                            if (cellData.ship) {
                                cell.classList.add('hit');
                            } else {
                                cell.classList.add('miss');
                            }
                        }
                    }
                    
                    if (isAI && gamePhase === 'battle' && !gameOver && playerTurn) {
                        cell.addEventListener('click', () => handlePlayerClick(row, col));
                    }
                    
                    if (!isAI && gamePhase === 'placement') {
                        cell.addEventListener('click', () => handlePlacementClick(row, col));
                        cell.addEventListener('mouseenter', () => previewShip(row, col));
                        cell.addEventListener('mouseleave', () => clearPreview());
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }

        function renderShipStatus(containerId, ships) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            ships.forEach(ship => {
                const item = document.createElement('div');
                item.className = 'ship-item' + (ship.sunk ? ' sunk' : '');
                item.textContent = `${ship.name} (${ship.size})`;
                container.appendChild(item);
            });
        }

        function handlePlayerClick(row, col) {
            if (gamePhase !== 'battle' || gameOver || !playerTurn) return;
            
            const cell = aiBoard[row][col];
            if (cell.hit) return;
            
            cell.hit = true;
            
            if (cell.ship) {
                checkSunk(cell.ship, aiBoard);
                document.getElementById('gameStatus').textContent = 'Hit! AI\'s turn...';
            } else {
                document.getElementById('gameStatus').textContent = 'Miss! AI\'s turn...';
            }
            
            renderBoard('aiGrid', aiBoard, true);
            renderShipStatus('aiShips', aiShips);
            
            if (checkWin(aiShips)) {
                gameOver = true;
                document.getElementById('gameStatus').textContent = 'You win! All enemy ships sunk!';
                revealAI();
                return;
            }
            
            playerTurn = false;
            setTimeout(aiTurn, 500);
        }

        function aiTurn() {
            if (gameOver) return;
            
            let row, col;
            
            if (huntMode) {
                // Hunt mode: fire at random unshot cells
                const randomCell = getRandomUnhitCell();
                row = randomCell.row;
                col = randomCell.col;
            } else {
                // Target mode
                if (!currentDirection) {
                    // Pick a new direction that hasn't been tried
                    const directions = ['up', 'down', 'left', 'right'];
                    const untried = directions.filter(d => !triedDirections.includes(d));
                    
                    if (untried.length === 0) {
                        // All directions exhausted, return to hunt mode
                        resetAITargeting();
                        const randomCell = getRandomUnhitCell();
                        row = randomCell.row;
                        col = randomCell.col;
                    } else {
                        // Pick a random untried direction
                        currentDirection = untried[Math.floor(Math.random() * untried.length)];
                        currentPosition = { ...originHit };
                        const nextPos = getNextPosition(currentPosition, currentDirection);
                        
                        if (nextPos && !playerBoard[nextPos.row][nextPos.col].hit) {
                            row = nextPos.row;
                            col = nextPos.col;
                        } else {
                            // Direction blocked or boundary, mark as exhausted
                            triedDirections.push(currentDirection);
                            currentDirection = null;
                            currentPosition = null;
                            // Try again with next direction
                            return aiTurn();
                        }
                    }
                } else {
                    // Continue in current direction
                    const nextPos = getNextPosition(currentPosition, currentDirection);
                    
                    if (nextPos && !playerBoard[nextPos.row][nextPos.col].hit) {
                        row = nextPos.row;
                        col = nextPos.col;
                    } else {
                        // Hit boundary or already hit, mark direction as exhausted
                        triedDirections.push(currentDirection);
                        currentDirection = null;
                        currentPosition = null;
                        // Try again with next direction
                        return aiTurn();
                    }
                }
            }
            
            const cell = playerBoard[row][col];
            cell.hit = true;
            
            if (cell.ship) {
                if (huntMode) {
                    // First hit, switch to target mode
                    originHit = { row, col };
                    currentPosition = { row, col };
                    huntMode = false;
                    triedDirections = [];
                    currentDirection = null;
                } else {
                    // Hit in target mode, continue in same direction
                    currentPosition = { row, col };
                }
                
                checkSunk(cell.ship, playerBoard);
                document.getElementById('gameStatus').textContent = 'AI hit your ship! Your turn.';
            } else {
                document.getElementById('gameStatus').textContent = 'AI missed! Your turn.';
                // Miss in target mode, mark direction as exhausted
                if (!huntMode && currentDirection) {
                    triedDirections.push(currentDirection);
                    currentDirection = null;
                    currentPosition = { ...originHit };
                }
            }
            
            renderBoard('playerGrid', playerBoard, false);
            renderShipStatus('playerShips', playerShips);
            
            if (checkWin(playerShips)) {
                gameOver = true;
                document.getElementById('gameStatus').textContent = 'AI wins! All your ships sunk!';
                revealAI();
                return;
            }
            
            playerTurn = true;
        }
        
        function getNextPosition(pos, direction) {
            let newRow = pos.row;
            let newCol = pos.col;
            
            switch (direction) {
                case 'up':
                    newRow = pos.row - 1;
                    break;
                case 'down':
                    newRow = pos.row + 1;
                    break;
                case 'left':
                    newCol = pos.col - 1;
                    break;
                case 'right':
                    newCol = pos.col + 1;
                    break;
            }
            
            // Check if within bounds
            if (newRow >= 0 && newRow < GRID_SIZE && newCol >= 0 && newCol < GRID_SIZE) {
                return { row: newRow, col: newCol };
            }
            
            return null;
        }
        
        
        function resetAITargeting() {
            huntMode = true;
            originHit = null;
            triedDirections = [];
            currentDirection = null;
            currentPosition = null;
        }

        function getRandomUnhitCell() {
            let row, col;
            do {
                row = Math.floor(Math.random() * GRID_SIZE);
                col = Math.floor(Math.random() * GRID_SIZE);
            } while (playerBoard[row][col].hit);
            return { row, col };
        }

        function getAdjacentCells(row, col) {
            return [
                { row: row - 1, col },
                { row: row + 1, col },
                { row, col: col - 1 },
                { row, col: col + 1 }
            ];
        }

        function checkSunk(ship, board) {
            const allHit = ship.cells.every(c => board[c.row][c.col].hit);
            if (allHit) {
                ship.sunk = true;
                // Only reset AI targeting when the AI sinks one of the player's
                // ships. Sinking an AI ship is the player's action and must not
                // wipe the AI's in-progress hunt/target state on the player board.
                if (board === playerBoard) {
                    resetAITargeting();
                }
            }
        }

        function checkWin(ships) {
            return ships.every(ship => ship.sunk);
        }

        function revealAI() {
            renderBoard('aiGrid', aiBoard, false);
        }

        initGame();
    </script>
</body>
</html>
