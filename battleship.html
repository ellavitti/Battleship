<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }
        .game-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .board-title {
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 35px);
            gap: 2px;
            background: #16213e;
            padding: 5px;
            border-radius: 8px;
        }
        .cell {
            width: 35px;
            height: 35px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
        }
        .cell:hover {
            background: #1a4a7a;
        }
        .cell.ship {
            background: #4a90d9;
        }
        .cell.hit {
            background: #e74c3c;
        }
        .cell.miss {
            background: #7f8c8d;
        }
        .cell.sunk {
            background: #8b0000;
        }
        .cell.ai-cell {
            cursor: pointer;
        }
        .cell.ai-cell.hit,
        .cell.ai-cell.miss,
        .cell.ai-cell.sunk {
            cursor: default;
        }
        .cell.player-cell {
            cursor: default;
        }
        .status-panel {
            margin-top: 20px;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            min-width: 200px;
        }
        .status-title {
            font-weight: 600;
            margin-bottom: 10px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        .ship-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9rem;
        }
        .ship-item.sunk {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .game-status {
            margin-top: 20px;
            font-size: 1.1rem;
            padding: 10px 20px;
            background: #16213e;
            border-radius: 8px;
        }
        .restart-btn {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 1rem;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .restart-btn:hover {
            background: #357abd;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Battleship</h1>
    <div class="game-status" id="gameStatus">Click on the enemy grid to fire!</div>
    <div class="game-container">
        <div class="board-section">
            <div class="board-title">Your Fleet</div>
            <div class="grid" id="playerGrid"></div>
            <div class="status-panel">
                <div class="status-title">Your Ships</div>
                <div id="playerShips"></div>
            </div>
        </div>
        <div class="board-section">
            <div class="board-title">Enemy Fleet</div>
            <div class="grid" id="aiGrid"></div>
            <div class="status-panel">
                <div class="status-title">Enemy Ships</div>
                <div id="aiShips"></div>
            </div>
        </div>
    </div>
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #4a90d9;"></div>
            <span>Ship</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e74c3c;"></div>
            <span>Hit</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #7f8c8d;"></div>
            <span>Miss</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #8b0000;"></div>
            <span>Sunk</span>
        </div>
    </div>
    <button class="restart-btn" onclick="initGame()">New Game</button>

    <script>
        const SHIPS = [
            { name: 'Carrier', size: 5 },
            { name: 'Battleship', size: 4 },
            { name: 'Cruiser', size: 3 },
            { name: 'Submarine', size: 3 },
            { name: 'Destroyer', size: 2 }
        ];

        const GRID_SIZE = 10;
        let playerBoard = [];
        let aiBoard = [];
        let playerShips = [];
        let aiShips = [];
        let gameOver = false;
        let playerTurn = true;

        // AI Hunt/Target mode
        let aiHits = [];
        let aiTargets = [];

        function initGame() {
            playerBoard = createEmptyBoard();
            aiBoard = createEmptyBoard();
            playerShips = [];
            aiShips = [];
            aiHits = [];
            aiTargets = [];
            gameOver = false;
            playerTurn = true;

            placeShips(playerBoard, playerShips);
            placeShips(aiBoard, aiShips);

            renderBoard('playerGrid', playerBoard, false);
            renderBoard('aiGrid', aiBoard, true);
            renderShipStatus('playerShips', playerShips);
            renderShipStatus('aiShips', aiShips);
            document.getElementById('gameStatus').textContent = 'Click on the enemy grid to fire!';
        }

        function createEmptyBoard() {
            return Array(GRID_SIZE).fill(null).map(() => 
                Array(GRID_SIZE).fill(null).map(() => ({ hit: false, ship: null }))
            );
        }

        function placeShips(board, shipsList) {
            SHIPS.forEach(shipType => {
                let placed = false;
                while (!placed) {
                    const horizontal = Math.random() < 0.5;
                    const row = Math.floor(Math.random() * GRID_SIZE);
                    const col = Math.floor(Math.random() * GRID_SIZE);
                    
                    if (canPlaceShip(board, row, col, shipType.size, horizontal)) {
                        const ship = {
                            name: shipType.name,
                            size: shipType.size,
                            cells: [],
                            sunk: false
                        };
                        
                        for (let i = 0; i < shipType.size; i++) {
                            const r = horizontal ? row : row + i;
                            const c = horizontal ? col + i : col;
                            board[r][c].ship = ship;
                            ship.cells.push({ row: r, col: c });
                        }
                        shipsList.push(ship);
                        placed = true;
                    }
                }
            });
        }

        function canPlaceShip(board, row, col, size, horizontal) {
            for (let i = 0; i < size; i++) {
                const r = horizontal ? row : row + i;
                const c = horizontal ? col + i : col;
                if (r >= GRID_SIZE || c >= GRID_SIZE || board[r][c].ship) {
                    return false;
                }
            }
            return true;
        }

        function renderBoard(gridId, board, isAI) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            
            for (let row = 0; row < GRID_SIZE; row++) {
                for (let col = 0; col < GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    const cellData = board[row][col];
                    
                    if (isAI) {
                        cell.classList.add('ai-cell');
                        if (cellData.hit) {
                            if (cellData.ship && cellData.ship.sunk) {
                                cell.classList.add('sunk');
                            } else if (cellData.ship) {
                                cell.classList.add('hit');
                            } else {
                                cell.classList.add('miss');
                            }
                        }
                    } else {
                        cell.classList.add('player-cell');
                        if (cellData.ship) {
                            if (cellData.ship.sunk) {
                                cell.classList.add('sunk');
                            } else {
                                cell.classList.add('ship');
                            }
                        }
                        if (cellData.hit) {
                            if (cellData.ship) {
                                cell.classList.add('hit');
                            } else {
                                cell.classList.add('miss');
                            }
                        }
                    }
                    
                    if (isAI && !gameOver && playerTurn) {
                        cell.addEventListener('click', () => handlePlayerClick(row, col));
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }

        function renderShipStatus(containerId, ships) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            ships.forEach(ship => {
                const item = document.createElement('div');
                item.className = 'ship-item' + (ship.sunk ? ' sunk' : '');
                item.textContent = `${ship.name} (${ship.size})`;
                container.appendChild(item);
            });
        }

        function handlePlayerClick(row, col) {
            if (gameOver || !playerTurn) return;
            
            const cell = aiBoard[row][col];
            if (cell.hit) return;
            
            cell.hit = true;
            
            if (cell.ship) {
                checkSunk(cell.ship);
                document.getElementById('gameStatus').textContent = 'Hit! AI\'s turn...';
            } else {
                document.getElementById('gameStatus').textContent = 'Miss! AI\'s turn...';
            }
            
            renderBoard('aiGrid', aiBoard, true);
            renderShipStatus('aiShips', aiShips);
            
            if (checkWin(aiShips)) {
                gameOver = true;
                document.getElementById('gameStatus').textContent = 'You win! All enemy ships sunk!';
                revealAI();
                return;
            }
            
            playerTurn = false;
            setTimeout(aiTurn, 500);
        }

        function aiTurn() {
            if (gameOver) return;
            
            let row, col;
            
            if (aiTargets.length > 0) {
                const target = aiTargets.shift();
                row = target.row;
                col = target.col;
            } else if (aiHits.length > 0) {
                const lastHit = aiHits[aiHits.length - 1];
                const adjacent = getAdjacentCells(lastHit.row, lastHit.col);
                const validTargets = adjacent.filter(c => 
                    c.row >= 0 && c.row < GRID_SIZE && 
                    c.col >= 0 && c.col < GRID_SIZE && 
                    !playerBoard[c.row][c.col].hit
                );
                
                if (validTargets.length > 0) {
                    const randomTarget = validTargets[Math.floor(Math.random() * validTargets.length)];
                    row = randomTarget.row;
                    col = randomTarget.col;
                } else {
                    aiHits = [];
                    const randomCell = getRandomUnhitCell();
                    row = randomCell.row;
                    col = randomCell.col;
                }
            } else {
                const randomCell = getRandomUnhitCell();
                row = randomCell.row;
                col = randomCell.col;
            }
            
            const cell = playerBoard[row][col];
            cell.hit = true;
            
            if (cell.ship) {
                aiHits.push({ row, col });
                const adjacent = getAdjacentCells(row, col);
                adjacent.forEach(c => {
                    if (c.row >= 0 && c.row < GRID_SIZE && 
                        c.col >= 0 && c.col < GRID_SIZE && 
                        !playerBoard[c.row][c.col].hit) {
                        aiTargets.push(c);
                    }
                });
                checkSunk(cell.ship);
                document.getElementById('gameStatus').textContent = 'AI hit your ship! Your turn.';
            } else {
                document.getElementById('gameStatus').textContent = 'AI missed! Your turn.';
            }
            
            renderBoard('playerGrid', playerBoard, false);
            renderShipStatus('playerShips', playerShips);
            
            if (checkWin(playerShips)) {
                gameOver = true;
                document.getElementById('gameStatus').textContent = 'AI wins! All your ships sunk!';
                revealAI();
                return;
            }
            
            playerTurn = true;
        }

        function getRandomUnhitCell() {
            let row, col;
            do {
                row = Math.floor(Math.random() * GRID_SIZE);
                col = Math.floor(Math.random() * GRID_SIZE);
            } while (playerBoard[row][col].hit);
            return { row, col };
        }

        function getAdjacentCells(row, col) {
            return [
                { row: row - 1, col },
                { row: row + 1, col },
                { row, col: col - 1 },
                { row, col: col + 1 }
            ];
        }

        function checkSunk(ship) {
            const allHit = ship.cells.every(c => playerBoard[c.row][c.col].hit || aiBoard[c.row][c.col].hit);
            if (allHit) {
                ship.sunk = true;
                // Remove from AI targets if it was tracking this ship
                aiHits = aiHits.filter(h => !ship.cells.some(c => c.row === h.row && c.col === h.col));
            }
        }

        function checkWin(ships) {
            return ships.every(ship => ship.sunk);
        }

        function revealAI() {
            renderBoard('aiGrid', aiBoard, false);
        }

        initGame();
    </script>
</body>
</html>
